#
# `organ=host` override (design §5). Drops the containerized model server and
# points the cycle/Nexus at a HOST-NATIVE OpenAI-compatible server on
# host.docker.internal:11434 (host.containers.internal for Podman). This
# preserves the Unsloth "one server for inference AND training" property and is
# the REQUIRED topology whenever the voice-alignment trainer is enabled, since
# the trainer is not containerized.
#
#   docker compose -f compose/kaine.yml -f compose/kaine.organ-host.yml up -d
#
# Point KAINE at the host server via config/kaine.operator.toml:
#   [lingua]
#   chat_url = "http://host.docker.internal:11434/v1"   # or host.containers.internal

services:
  # Remove the containerized organ from the default bring-up.
  kaine-model-server:
    profiles: [disabled-organ-host]

  kaine-nexus:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAINE_MODEL_SERVER_URL: ${KAINE_MODEL_SERVER_URL:-http://host.docker.internal:11434/v1}

  kaine-cycle:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KAINE_MODEL_SERVER_URL: ${KAINE_MODEL_SERVER_URL:-http://host.docker.internal:11434/v1}
