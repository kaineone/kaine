#
# The KAINE service topology of record (design.md §2). One Compose project
# stands up the full local instance — event bus, vector store, model server,
# speech-to-text, text-to-speech, and the Nexus web UI — WITHOUT the cognitive
# cycle. Every port is loopback-only, matching compose/redis.yml / qdrant.yml.
#
#   Default bring-up (no entity):
#     docker compose -f compose/kaine.yml up -d
#
#   One-shot setup — pull images + download ALL model weights into the shared
#   kaine-models volume (design §6); runtime then reaches no network for models:
#     docker compose -f compose/kaine.yml --profile setup run --rm kaine-provision
#
#   Boot the cognitive cycle — a DELIBERATE, operator-supervised step. The cycle
#   still refuses to start without KAINE_CYCLE_OPERATOR_PRESENT=1 (or the
#   research safety net); see FIRST_BOOT.md:
#     KAINE_CYCLE_OPERATOR_PRESENT=1 \
#       docker compose -f compose/kaine.yml --profile cycle run --rm kaine-cycle
#
# GPU: the reservations below target a two-GPU NVIDIA host (organ on card 0,
# vision + TTS on card 1). For a single GPU or CPU-only host, overlay
# compose/kaine.single-gpu.yml or compose/kaine.cpu.yml (see D2 docs). Secrets
# and gate flags come from compose/.env (see compose/.env.example).

name: kaine

# --- reusable fragments ---------------------------------------------------
x-kaine-image: &kaine-image
  build:
    context: ..
    dockerfile: Dockerfile
    args:
      FLAVOR: ${KAINE_FLAVOR:-cuda}
      # The running entity needs the perception runtime extras the lean default
      # (.[test]) omits: [internvideo] (Topos encoder: einops/timm/easydict),
      # [audio] (Audition + playlist decode: funasr/librosa/av), [vision]
      # (opencv). Override to a leaner/richer set for other deployments.
      KAINE_EXTRAS: ${KAINE_EXTRAS:-.[test,vision,audio,internvideo]}
  image: ${KAINE_IMAGE:-kaine:${KAINE_FLAVOR:-cuda}}

# NVIDIA device reservation fragments (design §4). Docker reads
# deploy.resources.reservations.devices; the CPU/single-GPU overlays drop them.
x-gpu-card0: &gpu-card0
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["${KAINE_ORGAN_GPU:-0}"]
            capabilities: [gpu]

x-gpu-card1: &gpu-card1
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: ["${KAINE_VISION_GPU:-1}"]
            capabilities: [gpu]

services:
  # ---- existing containerized services (event bus + vector store) --------
  kaine-redis:
    image: redis:7.2-alpine
    container_name: kaine-redis
    ports:
      - "127.0.0.1:${KAINE_REDIS_HOST_PORT:-6479}:6379"
    command:
      - redis-server
      - --requirepass
      - ${KAINE_REDIS_PASSWORD:?KAINE_REDIS_PASSWORD must be set (see compose/.env.example)}
      - --bind
      - "0.0.0.0"
      - --protected-mode
      - "yes"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - noeviction
      - --save
      - ""
    volumes:
      - kaine-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'redis-cli -a "$$KAINE_REDIS_PASSWORD" ping | grep PONG'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      KAINE_REDIS_PASSWORD: ${KAINE_REDIS_PASSWORD:?KAINE_REDIS_PASSWORD must be set (see compose/.env.example)}

  kaine-qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: kaine-qdrant
    ports:
      - "127.0.0.1:${KAINE_QDRANT_HOST_PORT:-6533}:6333"
    environment:
      QDRANT__SERVICE__API_KEY: ${KAINE_QDRANT_API_KEY:?KAINE_QDRANT_API_KEY must be set (see compose/.env.example)}
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - kaine-qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      # qdrant:v1.18.0 ships neither wget nor curl (the image is minimal), so an
      # HTTP-client probe exits 127 and the container is falsely unhealthy, blocking
      # every dependent. The image DOES ship bash, whose /dev/tcp opens a TCP socket
      # with no external tools — qdrant binds 6333 only once it is serving, so a
      # successful connect is a sound readiness signal.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---- model server: OpenAI-compatible language organ (design §5) --------
  # Default image is a generic OpenAI-compatible GGUF server (llama.cpp). Set
  # KAINE_MODEL_SERVER_IMAGE / _CMD to use vLLM or another server. For the
  # Unsloth shared inference+training server, use the `organ=host` override
  # (compose/kaine.organ-host.yml) — REQUIRED when the voice-alignment trainer
  # is enabled, since the trainer is not containerized.
  kaine-model-server:
    <<: *gpu-card0
    image: ${KAINE_MODEL_SERVER_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    container_name: kaine-model-server
    ports:
      - "127.0.0.1:${KAINE_MODEL_SERVER_HOST_PORT:-11434}:8080"
    # The API key is supplied via LLAMA_API_KEY (below), NOT a --api-key flag: an
    # empty ${KAINE_MODEL_SERVER_API_KEY} would render a bare `--api-key` with no
    # value, which llama-server rejects ("expected value for argument"), crash-looping
    # the organ. The env var tolerates empty (= no auth) and a set value (= auth).
    environment:
      LLAMA_API_KEY: ${KAINE_MODEL_SERVER_API_KEY:-}
    command: ${KAINE_MODEL_SERVER_CMD:---model /models/Qwen3.5-4B-abliterated-GGUF/KAINE-Qwen3.5-4B-abliterated.Q4_K_M.gguf --alias kaineone/Qwen3.5-4B-abliterated-GGUF --host 0.0.0.0 --port 8080}
    volumes:
      - kaine-models:/models:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS http://127.0.0.1:8080/v1/models >/dev/null'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- speech-to-text: Speaches / faster-distil-Whisper ------------------
  # Runs on CPU with medium.en — running Speaches on GPU triggers a cuDNN crash
  # when the secondary GPU also serves TTS (docs/getting-started.md#speaches).
  # No GPU reservation by design.
  kaine-speaches:
    image: ${KAINE_SPEACHES_IMAGE:-ghcr.io/speaches-ai/speaches:latest-cpu}
    container_name: kaine-speaches
    ports:
      - "127.0.0.1:${KAINE_SPEACHES_HOST_PORT:-8000}:8000"
    environment:
      HF_HOME: /models/hf
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - kaine-models:/models:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS http://127.0.0.1:8000/v1/models >/dev/null'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- text-to-speech: Chatterbox (shares the secondary GPU) -------------
  # No canonical upstream image; set KAINE_CHATTERBOX_IMAGE to your build.
  kaine-chatterbox:
    <<: *gpu-card1
    image: ${KAINE_CHATTERBOX_IMAGE:-kaine-chatterbox:local}
    container_name: kaine-chatterbox
    ports:
      - "127.0.0.1:${KAINE_CHATTERBOX_HOST_PORT:-8883}:8883"
    environment:
      HF_HOME: /models/hf
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - kaine-models:/models:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - 'curl -fsS http://127.0.0.1:8883/get_predefined_voices >/dev/null'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Nexus web UI: always-up, holds NO entity (design §2) --------------
  kaine-nexus:
    <<: *kaine-image
    container_name: kaine-nexus
    command: ["python", "-m", "kaine.nexus"]
    ports:
      - "127.0.0.1:${KAINE_NEXUS_HOST_PORT:-8088}:8088"
    environment:
      KAINE_REDIS_PASSWORD: ${KAINE_REDIS_PASSWORD:?KAINE_REDIS_PASSWORD must be set (see compose/.env.example)}
      # Bus by service name on the bridge network (see kaine-cycle). Nexus reaches
      # the bus through load_bus_config, which reads KAINE_REDIS_URL over the toml.
      KAINE_REDIS_URL: redis://:${KAINE_REDIS_PASSWORD}@kaine-redis:6379/0
      KAINE_QDRANT_API_KEY: ${KAINE_QDRANT_API_KEY:?KAINE_QDRANT_API_KEY must be set (see compose/.env.example)}
      KAINE_MODEL_SERVER_API_KEY: ${KAINE_MODEL_SERVER_API_KEY:-}
      # Same at-rest posture as the cycle, so the "state encryption" health line is
      # not DEGRADED and Nexus can read/write the shared encrypted fork/snapshots.
      KAINE_STATE_KEY: ${KAINE_STATE_KEY:-}
      # Bind the diagnostics server on all interfaces INSIDE the container so the
      # published 127.0.0.1:8088 mapping can reach it; the shipped [nexus].host is
      # 127.0.0.1, which binds the container's own loopback and is unreachable via
      # the port mapping. Publishing is still loopback-only (see ports:).
      KAINE_NEXUS_HOST: 0.0.0.0
    volumes:
      # Operator overlay + secrets bind-mounted READ-ONLY, never COPYed (design §8).
      - ../config/kaine.operator.toml:/app/config/kaine.operator.toml:ro
      - ../config/secrets.toml:/app/config/secrets.toml:ro
      # The app writes its state CWD-relative under WORKDIR /app (Dockerfile), so
      # the durable state volume mounts at /app/state — NOT /state — or nothing
      # the entity writes would survive down/up.
      - kaine-state:/app/state
      # Shared run-manifest volume (see kaine-cycle) — Nexus reads the admissibility
      # manifest the cycle writes here.
      - kaine-runs:/app/data/evaluation/runs
    restart: unless-stopped
    depends_on:
      kaine-redis:
        condition: service_healthy
      kaine-qdrant:
        condition: service_healthy
    healthcheck:
      # python (always present in the image) instead of curl (which is not) — a
      # curl-based check exits 127 and marks the container falsely unhealthy.
      test:
        - CMD-SHELL
        - 'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(''http://127.0.0.1:8088/diagnostics/health.json'', timeout=4).status==200 else 1)"'
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- the cognitive cycle: THE ENTITY. profile-gated, never default up --
  # `profiles: [cycle]` keeps it out of a plain `up`. The cycle refuses to boot
  # unless the operator explicitly exports KAINE_CYCLE_OPERATOR_PRESENT=1 (or the
  # research safety net is verified). NO boot-gate var is defaulted permissive
  # here (design §8): the operator sets them explicitly, preserving supervised
  # first boot.
  kaine-cycle:
    <<: [*kaine-image, *gpu-card1]
    profiles: [cycle]
    container_name: kaine-cycle
    command: ["python", "-m", "kaine.cycle"]
    environment:
      KAINE_REDIS_PASSWORD: ${KAINE_REDIS_PASSWORD:?KAINE_REDIS_PASSWORD must be set (see compose/.env.example)}
      # On the compose bridge network the bus is reached by SERVICE NAME, not the
      # host-facing 127.0.0.1:6479 mapping the shipped config/kaine.toml targets.
      # load_bus_config honours KAINE_REDIS_URL over the toml host/port, so this
      # redirects the bus for the containerized cycle without editing that config.
      KAINE_REDIS_URL: redis://:${KAINE_REDIS_PASSWORD}@kaine-redis:6379/0
      KAINE_QDRANT_API_KEY: ${KAINE_QDRANT_API_KEY:?KAINE_QDRANT_API_KEY must be set (see compose/.env.example)}
      KAINE_MODEL_SERVER_API_KEY: ${KAINE_MODEL_SERVER_API_KEY:-}
      # Encryption-at-rest key (design §7); empty unless the operator sets it.
      KAINE_STATE_KEY: ${KAINE_STATE_KEY:-}
      # Model weights live on the shared read-mostly kaine-models volume, apart
      # from the entity-state volume — the encoder + embedder load from here.
      KAINE_MODELS_DIR: /models
      # Boot gates: NOT defaulted to a permissive value. The operator must pass
      # them on the command line to boot the entity.
      KAINE_CYCLE_OPERATOR_PRESENT: ${KAINE_CYCLE_OPERATOR_PRESENT:-}
      KAINE_RESEARCH_MODE: ${KAINE_RESEARCH_MODE:-}
    volumes:
      - ../config/kaine.operator.toml:/app/config/kaine.operator.toml:ro
      - ../config/secrets.toml:/app/config/secrets.toml:ro
      # Durable entity state at /app/state (the app writes CWD-relative; see nexus).
      - kaine-state:/app/state
      # Provisioned weights (InternVideo-Next encoder, MiniLM embedder, emotion2vec)
      # read-only from the shared model volume; HF_HOME=/models/hf is baked in.
      - kaine-models:/models:ro
      # Evaluation run manifests on a SHARED volume so the Nexus admissibility probe
      # (runs_manifest_root = data/evaluation/runs) sees the manifest the cycle
      # writes — otherwise each container has its own ephemeral /app/data and Nexus
      # reports "manifest absent". No raw sense data is written here (manifests only).
      - kaine-runs:/app/data/evaluation/runs
      # Perception scratch: RAM-backed and ephemeral, NEVER a durable volume (zero
      # raw-sense-data persistence, design §7). Long-form with mode 1777 because a
      # tmpfs nested under the /app/state volume inherits that mountpoint's 0755
      # root ownership and is otherwise unwritable by the non-root `kaine` user.
      - type: tmpfs
        target: /app/state/perception
        tmpfs:
          mode: 01777
    depends_on:
      kaine-redis:
        condition: service_healthy
      kaine-qdrant:
        condition: service_healthy

  # ---- setup one-shot: provision images + ALL model weights (design §6) --
  # Downloads the abliterated organ, distil-Whisper, Chatterbox, emotion2vec+,
  # the InternVideo-Next clip encoder (the shipped default vision backend; DINOv2
  # only if [topos].encoder_backend = "dinov2"), and MiniLM BEFORE first boot, so
  # runtime reaches no network for models. Reuses the repo's `hf download`
  # organ provisioning. Runs under `--profile setup`, never at normal `up`.
  kaine-provision:
    <<: *kaine-image
    profiles: [setup]
    container_name: kaine-provision
    entrypoint: ["python", "-m", "kaine.setup.provision"]
    environment:
      HF_HOME: /models/hf
      # Land the organ GGUF + InternVideo-Next weights on the shared model volume
      # (not the entity-state volume) so the model server and cycle find them; the
      # per-model subdir names are unchanged, only the root moves off state/models.
      KAINE_MODELS_DIR: /models
      # Setup phase is the ONLY time network model fetches are allowed.
      HF_HUB_OFFLINE: "0"
      TRANSFORMERS_OFFLINE: "0"
    volumes:
      - kaine-models:/models

volumes:
  kaine-redis-data:
    name: kaine-redis-data
  kaine-qdrant-data:
    name: kaine-qdrant-data
  # Model weights (HF_HOME + organ GGUF). Provisioned at setup; read-mostly.
  # NEVER an image layer.
  kaine-models:
    name: kaine-models
  # The entity's life: CAL-gated forks, preservation bundles, individuation,
  # world/self models, control state, audit + incident logs. Owner-only perms
  # preserved inside the container; encrypted at rest when state encryption is
  # on. Survives down/up. NO raw-sense-data path exists here.
  kaine-state:
    name: kaine-state
  # Evaluation run manifests, shared read/write between the cycle (writer) and
  # Nexus (admissibility reader). Metadata only — never raw sense data.
  kaine-runs:
    name: kaine-runs
